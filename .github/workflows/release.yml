name: Release installers

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  WING_VERSION: "1.0.0"

jobs:
  windows:
    name: Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29.2"
          channel: stable
          cache: true

      - name: Build Windows installer
        shell: pwsh
        run: |
          .\scripts\mk.ps1 package
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          Copy-Item dist\wing-installer.exe artifacts\wing-1.0.0-windows-x64.exe -Force

      - uses: actions/upload-artifact@v4
        with:
          name: wing-windows
          path: artifacts/wing-1.0.0-windows-x64.exe

  macos:
    name: macOS installer
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build macOS pkg
        run: |
          bash scripts/package-macos.sh
          mkdir -p artifacts
          cp dist/wing-1.0.0-macos-x64.pkg artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: wing-macos
          path: artifacts/wing-1.0.0-macos-x64.pkg

  linux:
    name: Linux installer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgtk-3-dev libayatana-appindicator3-dev

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Linux installer
        run: |
          bash scripts/package-linux.sh
          mkdir -p artifacts
          cp dist/wing-1.0.0-linux-x64.run artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: wing-linux
          path: artifacts/wing-1.0.0-linux-x64.run

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - windows
      - macos
      - linux
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: wing v1.0.0
          body: |
            wing v1.0.0 installers.

            Assets:
            - Windows: wing-1.0.0-windows-x64.exe
            - macOS: wing-1.0.0-macos-x64.pkg
            - Linux: wing-1.0.0-linux-x64.run
          files: artifacts/*
