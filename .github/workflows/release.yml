name: Release installers

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  WING_VERSION: "1.0.5"
  FLUTTER_VERSION: "3.29.2"
  FLUTTER_BUILD_NUMBER: "1005"

jobs:
  windows:
    name: Windows installer
    # Flutter 3.29.2 expects the VS 2022 Windows desktop toolchain.
    runs-on: windows-2022
    env:
      # Flutter Windows plugin symlinks fail when Pub cache lives on another drive.
      PUB_CACHE: ${{ github.workspace }}/.pub-cache
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Build Windows installer
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
        run: |
          choco install innosetup --no-progress -y
          .\scripts\mk.ps1 build
          .\scripts\sign-windows.ps1 .\build\bin\wing.exe .\build\bin\flutter_ui\wing_ui.exe
          .\scripts\package.ps1
          .\scripts\sign-windows.ps1 "dist\wing-$($env:WING_VERSION)-windows-x64-setup.exe"
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          Copy-Item "dist\wing-$($env:WING_VERSION)-windows-x64-setup.exe" "artifacts\wing-$($env:WING_VERSION)-windows-x64-setup.exe" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: wing-windows
          path: artifacts/wing-${{ env.WING_VERSION }}-windows-x64-setup.exe

  linux:
    name: Linux installer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgtk-3-dev libayatana-appindicator3-dev

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Linux installer
        run: |
          bash scripts/package-linux.sh
          mkdir -p artifacts
          cp "dist/wing-${WING_VERSION}-linux-x64.run" artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: wing-linux
          path: artifacts/wing-${{ env.WING_VERSION }}-linux-x64.run

  macos:
    name: macOS installer
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build macOS pkg
        run: |
          bash scripts/package-macos.sh
          mkdir -p artifacts
          cp "dist/wing-${WING_VERSION}-macos-x64.pkg" artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: wing-macos
          path: artifacts/wing-${{ env.WING_VERSION }}-macos-x64.pkg

  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Build Android APK
        run: |
          mkdir -p "$GITHUB_WORKSPACE/artifacts"
          bash scripts/package-android.sh
          cp "dist/wing-${WING_VERSION}-android-universal.apk" "$GITHUB_WORKSPACE/artifacts/"

      - uses: actions/upload-artifact@v4
        with:
          name: wing-android
          path: artifacts/wing-${{ env.WING_VERSION }}-android-universal.apk

  ios:
    name: iOS unsigned IPA
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Build unsigned iOS IPA
        run: |
          mkdir -p "$GITHUB_WORKSPACE/artifacts"
          bash scripts/package-ios.sh
          cp "dist/wing-${WING_VERSION}-ios-unsigned.ipa" "$GITHUB_WORKSPACE/artifacts/"

      - uses: actions/upload-artifact@v4
        with:
          name: wing-ios
          path: artifacts/wing-${{ env.WING_VERSION }}-ios-unsigned.ipa

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - windows
      - linux
      - macos
      - android
      - ios
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.WING_VERSION }}
          name: wing v${{ env.WING_VERSION }}
          body: |
            wing v${{ env.WING_VERSION }} release assets.

            Assets:
            - Windows: wing-${{ env.WING_VERSION }}-windows-x64-setup.exe
            - Linux: wing-${{ env.WING_VERSION }}-linux-x64.run
            - macOS: wing-${{ env.WING_VERSION }}-macos-x64.pkg
            - Android: wing-${{ env.WING_VERSION }}-android-universal.apk
            - iOS: wing-${{ env.WING_VERSION }}-ios-unsigned.ipa

            Notes:
            - The iOS IPA is unsigned and must be signed with an Apple Developer certificate before device distribution.
          files: artifacts/*
          overwrite_files: true
